services:
  webhook:
    build:
      context: ../../
      dockerfile: services/webhook/Dockerfile.dev
    volumes:
      - ../../services/webhook/src:/app/services/webhook/src
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_webhook
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cmdb-network

networks:
  cmdb-network:
    external: true
