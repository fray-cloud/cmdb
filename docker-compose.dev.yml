services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cmdb}
      POSTGRES_DB: ${POSTGRES_DB:-cmdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cmdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cmdb-network

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "cmdb-dev-cluster-001"
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - cmdb-network

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cmdb-network

  ipam:
    build:
      context: .
      dockerfile: services/ipam/Dockerfile.dev
    volumes:
      - ./services/ipam/src:/app/services/ipam/src
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_ipam
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cmdb-network

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile.dev
    volumes:
      - ./services/auth/src:/app/services/auth/src
      - ./keys:/app/keys:ro
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_auth
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      RSA_PRIVATE_KEY_PATH: /app/keys/private.pem
      RSA_PUBLIC_KEY_PATH: /app/keys/public.pem
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cmdb-network

  tenant:
    build:
      context: .
      dockerfile: services/tenant/Dockerfile.dev
    volumes:
      - ./services/tenant/src:/app/services/tenant/src
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_tenant
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cmdb-network

  event:
    build:
      context: .
      dockerfile: services/event/Dockerfile.dev
    volumes:
      - ./services/event/src:/app/services/event/src
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_event
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cmdb-network

  webhook:
    build:
      context: .
      dockerfile: services/webhook/Dockerfile.dev
    volumes:
      - ./services/webhook/src:/app/services/webhook/src
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_webhook
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cmdb-network

  frontend:
    build:
      context: ./frontend
      dockerfile: apps/client/Dockerfile.dev
    volumes:
      - ./frontend/apps/client/src:/app/apps/client/src
      - ./frontend/packages:/app/packages
    ports:
      - "3000:3000"
    networks:
      - cmdb-network

  nginx:
    image: nginx:latest
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      ipam:
        condition: service_started
      auth:
        condition: service_started
      tenant:
        condition: service_started
      event:
        condition: service_started
      webhook:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - cmdb-network

  # ── Init containers (migration) ──
  auth-init:
    build:
      context: .
      dockerfile: services/auth/Dockerfile.dev
    command: uv run --package cmdb-auth alembic upgrade head
    working_dir: /app/services/auth
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_auth
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["init"]
    networks:
      - cmdb-network

  ipam-init:
    build:
      context: .
      dockerfile: services/ipam/Dockerfile.dev
    command: uv run --package cmdb-ipam alembic upgrade head
    working_dir: /app/services/ipam
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_ipam
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["init"]
    networks:
      - cmdb-network

  event-init:
    build:
      context: .
      dockerfile: services/event/Dockerfile.dev
    command: uv run --package cmdb-event alembic upgrade head
    working_dir: /app/services/event
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_event
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["init"]
    networks:
      - cmdb-network

  tenant-init:
    build:
      context: .
      dockerfile: services/tenant/Dockerfile.dev
    command: uv run --package cmdb-tenant alembic upgrade head
    working_dir: /app/services/tenant
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cmdb}:${POSTGRES_PASSWORD:-cmdb}@postgres:5432/cmdb_tenant
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["init"]
    networks:
      - cmdb-network

volumes:
  postgres-data:
  kafka-data:
  redis-data:

networks:
  cmdb-network:
    driver: bridge
