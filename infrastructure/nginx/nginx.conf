worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # --- Logging ---
    log_format json_log escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"correlation_id":"$http_x_correlation_id",'
        '"user_agent":"$http_user_agent",'
        '"referer":"$http_referer"}';

    access_log /var/log/nginx/access.log json_log;
    error_log /var/log/nginx/error.log warn;

    # --- Rate Limiting ---
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_status 429;

    # --- CORS ---
    map $http_origin $cors_origin {
        default "";
        ~^https?://localhost(:\d+)?$ $http_origin;
        ~^https://.*\.cmdb\.io$ $http_origin;
    }

    # --- DNS resolver for dynamic upstreams ---
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- Upstreams ---
    upstream frontend {
        server frontend:3000;
    }

    upstream auth {
        server auth:8000;
    }

    upstream tenant {
        server tenant:8000;
    }

    upstream ipam {
        server ipam:8000;
    }

    upstream event {
        server event:8000;
    }

    upstream webhook {
        server webhook:8000;
    }

    # --- HTTP server (dev) ---
    server {
        listen 80;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS preflight
        location ~* ^/api/.*$ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID, X-Tenant-ID" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }
            return 404;
        }

        # Public endpoints
        location = /api/v1/auth/login {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/auth/login;
        }
        location = /api/v1/auth/register {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/auth/register;
        }
        location = /api/v1/auth/refresh {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/auth/refresh;
        }
        location /api/v1/setup/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://tenant/setup/;
        }
        location /api/v1/tenant/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://tenant/;
        }

        # IPAM
        location /api/v1/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://ipam/api/v1/;
        }

        # Event
        location /api/v1/event/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://event/;
        }

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # --- Main HTTPS server ---
    server {
        listen 443 ssl;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Common proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # =====================================================================
        # CORS preflight (all /api/ paths)
        # =====================================================================
        location ~* ^/api/.*$ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Correlation-ID, X-Tenant-ID" always;
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            # Non-OPTIONS requests fall through to named locations below
            # This block only handles OPTIONS; other methods are handled
            # by the more specific location blocks below.
            return 404;
        }

        # =====================================================================
        # Internal: auth_request target
        # =====================================================================
        location = /internal/auth/validate {
            internal;
            proxy_pass http://auth/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
        }

        # =====================================================================
        # Public endpoints (no JWT required)
        # =====================================================================
        location = /api/v1/auth/login {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/auth/login;
        }

        location = /api/v1/auth/register {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/auth/register;
        }

        location = /api/v1/auth/refresh {
            limit_req zone=api_limit burst=10 nodelay;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/auth/refresh;
        }

        location /api/v1/auth/.well-known/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/auth/.well-known/;
        }

        # Setup endpoints (public, no auth)
        location /api/v1/setup/ {
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://tenant/setup/;
        }

        # =====================================================================
        # Protected endpoints (JWT required via auth_request)
        # =====================================================================

        # Auth service (logout, users, roles, api-tokens, permissions)
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/;
        }

        location /api/v1/users/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/users/;
        }

        location /api/v1/roles/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/roles/;
        }

        location /api/v1/api-tokens/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/api-tokens/;
        }

        location /api/v1/permissions/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://auth/permissions/;
        }

        # Tenant service
        location /api/v1/tenant/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://tenant/;
        }

        # IPAM service
        location /api/v1/ipam/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://ipam/;
        }

        # Event service
        location /api/v1/event/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://event/;
        }

        # Webhook service
        location /api/v1/webhook/ {
            limit_req zone=api_limit burst=50 nodelay;
            auth_request /internal/auth/validate;
            auth_request_set $auth_user_id $upstream_http_x_user_id;
            auth_request_set $auth_tenant_id $upstream_http_x_tenant_id;

            proxy_set_header X-User-ID $auth_user_id;
            proxy_set_header X-Tenant-ID $auth_tenant_id;
            add_header Access-Control-Allow-Origin $cors_origin always;
            proxy_pass http://webhook/;
        }

        # =====================================================================
        # Frontend (Next.js)
        # =====================================================================
        location / {
            proxy_pass http://frontend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
